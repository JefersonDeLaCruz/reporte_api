services:
  app:
    build:
      context: .
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    container_name: api_app
    volumes:
      - ./src:/var/www/html:delegated
    depends_on:
      - db
    networks:
      - api_net

  nginx:
    image: nginx:alpine
    container_name: api_nginx
    ports:
      - "8082:80"
    volumes:
      - ./src:/var/www/html:delegated
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - api_net

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: api_cloudflared
    command: tunnel run --token ${CLOUDFLARE_TUNNEL_TOKEN} --protocol http2
    depends_on:
      - nginx
    networks:
      - api_net
    restart: unless-stopped

  scheduler:
    build:
      context: .
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    container_name: api_scheduler
    command: php artisan schedule:work
    volumes:
      - ./src:/var/www/html:delegated
    depends_on:
      - db
    networks:
      - api_net
    restart: unless-stopped

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: api_phpmyadmin
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_USER: apiuser
      PMA_PASSWORD: apipass
    depends_on:
      - db
    networks:
      - api_net

  db:
    image: mysql:8.0
    container_name: api_db
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: apidb
      MYSQL_USER: apiuser
      MYSQL_PASSWORD: apipass
      TZ: America/El_Salvador
    command: --sql-mode="NO_ENGINE_SUBSTITUTION,ALLOW_INVALID_DATES,STRICT_TRANS_TABLES"
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - api_net

volumes:
  db_data:

networks:
  api_net:
    driver: bridge